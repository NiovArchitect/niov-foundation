# Render Blueprint — Foundation API serving Otzar (api.otzar.ai). [OTZAR-LIVE-DEPLOY-1]
#
# Use it: Render dashboard → New + → Blueprint → connect this repo
# (niov-foundation) → Render reads this file → Apply.
#
# SECRETS ARE NOT IN THIS FILE. Every secret below is marked `sync: false`, so
# Render will prompt you to paste each value in the dashboard when the service is
# created (and never stores them in git). Non-secret config has literal values.
#
# REDIS_URL: create a Render Key Value first (New + → Key Value, name otzar-redis),
# then paste its Internal Redis URL into the REDIS_URL prompt. (Left as sync:false
# rather than auto-wired, to keep this Blueprint resilient across Render versions.)
#
# After the service is created, add the custom domain api.otzar.ai in Settings →
# Custom Domains; Render shows the exact CNAME target for Namecheap. The container
# binds 0.0.0.0:$PORT (Render sets PORT) and serves health at /api/v1/health.
#
# ─── IF ROUTES 404 AFTER MERGE TO MAIN (stuck deploy) ───────────────────────
#   Diagnosis (local):
#     bash scripts/render-deploy-check.sh
#   Manual (browser, already logged in):
#     1. https://dashboard.render.com → service otzar-api
#     2. Settings → Build & Deploy:
#          Branch = main | Auto-Deploy = Yes
#          Root Directory empty | Dockerfile Path = ./Dockerfile
#     3. Manual Deploy → Deploy latest commit
#     4. Events: status Live for latest origin/main SHA
#     5. Verify: POST /api/v1/relay/messages returns 401 (not 404)
#        GET /api/v1/health includes git_commit matching main
#   API trigger (valid key from Account Settings → API Keys):
#     export RENDER_API_KEY=rnd_…
#     bash scripts/render-deploy-check.sh --trigger
# ────────────────────────────────────────────────────────────────────────────
services:
  - type: web
    runtime: docker
    name: otzar-api
    branch: main
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    # Always-on paid tier (Action scheduler needs continuous process).
    plan: starter
    # Auto-Deploy ON for main. Blueprint value does NOT always sync to an
    # already-created service — re-check Auto-Deploy=Yes in the live service
    # Settings after Blueprint apply.
    autoDeploy: true
    envVars:
      # --- non-secret config ---
      - key: NODE_ENV
        value: production
      - key: CLOUD_TARGET
        value: production
      - key: VOICE_STT_PROVIDER
        value: elevenlabs
      - key: ELEVENLABS_STT_MODEL
        value: scribe_v1
      - key: CONTROL_TOWER_URL
        value: https://app.otzar.ai
      # --- secrets: paste in Render dashboard (never in git) ---
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # Required at boot (embedding provider constructed at startup).
      - key: OPENAI_API_KEY
        sync: false
      # Stable APPLICATION entity id — avoid minting a new one every boot.
      - key: OTZAR_ENTITY_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
