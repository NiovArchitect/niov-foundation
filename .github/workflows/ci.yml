# Track A Gate 7: PR-blocking CI checks per ADR-0015.
# Runs typecheck + unit + integration tiers on every PR and
# every push to main. The real-LLM tier is excluded here
# (lives in nightly-real-llm.yml per Decision C).
#
# 8 locked architectural decisions (A-H) in ADR-0015. Key
# pins for substrate-honesty discipline:
# - Decision E: pgvector/pgvector:0.8.2-pg16-trixie pinned (parity with Supabase pgvector + ADR-0015 Decision E amendment at G3.2; true parity
#   with docker-compose.test.yml; Drift G7-A resolution)
# - Decision G: npm caching via setup-node@v6
# - Decision H: Node 22.11.0 via .nvmrc (LTS posture per
#   Decision 11 Path 2; Drifts G7-C resolution)
# - Drift G7-PRE-B: npm run db:generate REQUIRED after
#   npm ci because npm ci wipes node_modules including
#   node_modules/.prisma/client; without this step every
#   job fails at module load and TS error count regresses
#   from 12 to 254.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck (strict 4-error baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Run typecheck (strict baseline)
        run: |
          set +e
          npx tsc --noEmit -p tsconfig.json 2>&1 | tee tsc-output.log
          set -e
          ERROR_COUNT=$(grep -c "error TS" tsc-output.log || echo 0)
          echo "TS error count: $ERROR_COUNT (baseline: 4)"
          if [ "$ERROR_COUNT" -gt 4 ]; then
            echo "::error::TS error count $ERROR_COUNT exceeds baseline 4"
            exit 1
          fi
          echo "✓ TS baseline preserved at $ERROR_COUNT errors"
      - name: Upload typecheck diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: typecheck-diagnostics-${{ github.run_id }}
          path: tsc-output.log
          retention-days: 14

  unit-tests:
    name: Unit tier (371 tests)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/foundation_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5433/foundation_test
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foundation_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d foundation_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Apply pgvector extension (G3.3 per ADR-0043; MUST run before db push so vector type is registered)
        run: npx tsx scripts/apply-pgvector-extension.ts
      - name: Push schema to test database
        run: npm run db:push
      - name: Apply audit triggers
        run: npx tsx scripts/apply-audit-triggers.ts
      - name: Apply HNSW index (G3.3 per ADR-0043; MUST run after db push so embedding column exists)
        run: npx tsx scripts/apply-hnsw-index.ts
      - name: Run unit tests
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee test-unit-output.log
      - name: Capture environment metadata on failure
        if: failure()
        run: |
          {
            echo "=== Node + npm ==="
            node -v
            npm -v
            echo ""
            echo "=== OS ==="
            cat /etc/os-release || true
            echo ""
            echo "=== Vitest version ==="
            npx vitest --version || true
            echo ""
            echo "=== Postgres image ==="
            docker ps --filter ancestor=pgvector/pgvector:0.8.2-pg16-trixie || true
          } > env-metadata.log 2>&1
      - name: Upload unit-tier diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: unit-tier-diagnostics-${{ github.run_id }}
          path: |
            test-unit-output.log
            env-metadata.log
          retention-days: 14

  integration-tests:
    name: Integration tier (111 tests + 1 skipped)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/foundation_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5433/foundation_test
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foundation_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d foundation_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate
      - name: Apply pgvector extension (G3.3 per ADR-0043; MUST run before db push so vector type is registered)
        run: npx tsx scripts/apply-pgvector-extension.ts
      - name: Push schema to test database
        run: npm run db:push
      - name: Apply audit triggers
        run: npx tsx scripts/apply-audit-triggers.ts
      - name: Apply HNSW index (G3.3 per ADR-0043; MUST run after db push so embedding column exists)
        run: npx tsx scripts/apply-hnsw-index.ts
      - name: Run integration tests
        run: |
          set -o pipefail
          npm run test:integration 2>&1 | tee test-integration-output.log
      - name: Capture environment metadata on failure
        if: failure()
        run: |
          {
            echo "=== Node + npm ==="
            node -v
            npm -v
            echo ""
            echo "=== OS ==="
            cat /etc/os-release || true
            echo ""
            echo "=== Vitest version ==="
            npx vitest --version || true
            echo ""
            echo "=== Postgres image ==="
            docker ps --filter ancestor=pgvector/pgvector:0.8.2-pg16-trixie || true
          } > env-metadata.log 2>&1
      - name: Upload integration-tier diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-tier-diagnostics-${{ github.run_id }}
          path: |
            test-integration-output.log
            env-metadata.log
          retention-days: 14

  elixir:
    name: Elixir tier (compile + test)
    runs-on: ubuntu-latest
    # Sub-phase 5b-ii [BEAM-COSMP-INTEROP-PERSISTENCE] per ADR-0033
    # §Decision Q-PG-TEST + D-5BII-EXEC-2: Postgres service block for
    # the Elixir tier; pgvector/pgvector:0.8.2-pg16-trixie matches ADR-0015 §Decision E amendment at G3.2
    # pin used by the TS unit tier. Port-map 5433:5432 mirrors the local
    # Colima container convention so config/test.exs's hardcoded
    # localhost:5433 URL works in both registers without env-var
    # plumbing.
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foundation_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    # Sub-phase 5b-ii CI-FIX per ADR-0033 §Decision Q-PG-TEST: the
    # Postgres service container above starts EMPTY (fresh-per-job).
    # CosmpRouter.Storage.PostgresTest setup INSERTs into the
    # `entities` + `wallets` tables — must exist before mix test.
    # Mirror the TS unit tier schema-push pattern: setup Node + npm
    # ci + Prisma generate + Prisma push + audit-trigger install
    # BEFORE mix test. DATABASE_URL + DIRECT_URL set at job level
    # so npm-side Prisma scripts pick them up; mix test reads URL
    # from config/test.exs (hardcoded same value). DIRECT_URL is
    # required by prisma/schema.prisma:15 directUrl declaration
    # (Supabase pooler/direct-connection split per ADR-0018);
    # mirrors TS unit tier env block at L65-67 VERBATIM
    # (D-CI-FRESH-3 mirror-from-canonical discipline).
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/foundation_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5433/foundation_test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js (for Prisma schema push to test DB)
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Foundation deps (Prisma + tsx)
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply pgvector extension (G3.3 per ADR-0043; MUST run before db push so vector type is registered)
        run: npx tsx scripts/apply-pgvector-extension.ts

      - name: Push Prisma schema to test DB (fresh-per-job Postgres service)
        run: npm run db:push

      - name: Apply audit_events BEFORE DELETE trigger (ADR-0002)
        run: npx tsx scripts/apply-audit-triggers.ts

      - name: Apply HNSW index (G3.3 per ADR-0043; MUST run after db push so embedding column exists)
        run: npx tsx scripts/apply-hnsw-index.ts

      - name: Setup BEAM (Elixir + Erlang/OTP per .tool-versions)
        uses: erlef/setup-beam@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Restore deps + _build cache
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          # Sub-phase 5b-i: mix.lock landed alongside :grpc + :protobuf
          # deps for the BEAM gRPC interop layer (ADR-0032). Cache key
          # now hashes both .tool-versions (BEAM runtime pin) and
          # **/mix.lock (Hex dep pin). actions/cache pinned to v5 per
          # the 2026-06-02 v4 deprecation.
          key: ${{ runner.os }}-mix-${{ hashFiles('.tool-versions', '**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install deps
        run: mix deps.get

      - name: Compile (no warnings-as-errors at sub-phase 3)
        run: mix compile

      # Sub-phase 5b-iii [BEAM-COSMP-INTEROP-INTEGRATION-IDEMPOTENCY]
      # per ADR-0033 §Decision 6 (D-IDEMPOTENCY-3 substrate-build
      # observation; D-CI-FRESH-1/2/3 cluster lesson applied at
      # draft-time): run Elixir-owned migrations against the
      # fresh-per-job Postgres service. The TS unit tier's
      # `prisma db push` populates Prisma-owned shared tables only;
      # Elixir-owned tables (idempotency_keys + future) are migrated
      # separately by Ecto. MIX_ENV=test uses config/test.exs's
      # hardcoded localhost:5433/foundation_test URL (matches the
      # Postgres service block above).
      - name: Run Ecto migrations (Elixir-owned tables; ADR-0033 §6)
        run: cd apps/cosmp_router && mix ecto.migrate
        env:
          MIX_ENV: test

      - name: Test
        # Per ADR-0035 substrate-build discipline canonical: --include
        # integration flag is canonical-discipline marker. At sub-phase
        # 6b register all tests are default-suite (no :integration-tagged
        # tests remain post-router_test.exs + grpc/server_test.exs
        # substrate-state-coherent rewrite per ADR-0034 Sub-decision 3
        # canonical). Flag is no-op at behavioral register but substrate-
        # coherent for future Elixir/BEAM substrate at sub-phases 7-13
        # DBGI where expensive-test-tier :integration-tagged tests may
        # surface (observability, libcluster multi-region, etc.).
        run: mix test --include integration

  python-intelligence:
    name: Python intelligence runtime
    runs-on: ubuntu-latest
    # Independent of the rest of the matrix — no DB needed, no Node
    # needed. Runs the deterministic ranker + forecaster tests for the
    # FastAPI service at services/python-intelligence/. Foundation TS
    # wrapper at apps/api/src/services/intelligence/python-ranking.service.ts
    # talks to this service over HTTP when
    # PYTHON_INTELLIGENCE_RUNTIME_URL is set; the wrapper otherwise
    # falls back to its in-process fixture ranker (see ADR-0048
    # personalization-orchestration substrate).
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/python-intelligence/requirements-dev.txt
      - name: Install deps
        run: |
          cd services/python-intelligence
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Pytest
        run: |
          cd services/python-intelligence
          pytest -q
