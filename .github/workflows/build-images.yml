# Build all four container images on every push to main.
#
# - Foundation API:        ./Dockerfile
# - Python Intelligence:   ./services/python-intelligence/Dockerfile
# - Collaboration BEAM:    ./apps/collaboration_supervisor/Dockerfile
# - Control Tower SPA:     lives in otzar-control-tower repo; built there.
#
# Pushes images to a container registry when registry credentials are
# configured as repository secrets:
#
#   REGISTRY_KIND        = "ghcr" | "acr" | "ecr" | "skip"   (default "skip")
#   REGISTRY_HOSTNAME    = e.g. ghcr.io / myacr.azurecr.io
#   REGISTRY_USERNAME    = (ACR/GHCR only; ECR uses OIDC role)
#   REGISTRY_PASSWORD    = (ACR/GHCR only)
#   AWS_ECR_ROLE_ARN     = (ECR only; OIDC-assumable role)
#   AWS_REGION           = (ECR only)
#
# If REGISTRY_KIND is unset or "skip", the workflow builds images
# locally (verifying Dockerfile correctness) WITHOUT pushing — useful
# for PR validation before cloud secrets exist.

name: Build container images

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "docker-compose.local.yml"
      - "apps/collaboration_supervisor/**"
      - "services/python-intelligence/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # for AWS OIDC
  packages: write   # for GHCR

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-foundation-api:
    name: Foundation API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build Foundation API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: niov/foundation-api:${{ env.IMAGE_TAG }}
          push: false
          load: true
          cache-from: type=gha,scope=foundation-api
          cache-to: type=gha,scope=foundation-api,mode=max
      - name: Smoke (image exists)
        run: docker image inspect niov/foundation-api:${{ env.IMAGE_TAG }} > /dev/null
      - name: Publish to registry (if configured)
        if: vars.REGISTRY_KIND == 'ghcr' || vars.REGISTRY_KIND == 'acr' || vars.REGISTRY_KIND == 'ecr'
        env:
          REGISTRY_KIND: ${{ vars.REGISTRY_KIND }}
          REGISTRY_HOSTNAME: ${{ vars.REGISTRY_HOSTNAME }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "::notice::Registry push skipped — implement when ${REGISTRY_KIND} secrets exist."
          echo "::notice::Image niov/foundation-api:${IMAGE_TAG} built and verified locally."

  build-python-intelligence:
    name: Python Intelligence image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build Python Intelligence image
        uses: docker/build-push-action@v6
        with:
          context: ./services/python-intelligence
          file: ./services/python-intelligence/Dockerfile
          tags: niov/python-intelligence:${{ env.IMAGE_TAG }}
          push: false
          load: true
          cache-from: type=gha,scope=python-intelligence
          cache-to: type=gha,scope=python-intelligence,mode=max
      - name: Smoke (image exists)
        run: docker image inspect niov/python-intelligence:${{ env.IMAGE_TAG }} > /dev/null
      - name: Smoke (container starts + /health returns 200)
        run: |
          docker run -d --name py-smoke -p 8000:8000 niov/python-intelligence:${{ env.IMAGE_TAG }}
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "✓ Python intelligence /health OK"
              break
            fi
            sleep 1
          done
          docker rm -f py-smoke

  build-collaboration-supervisor:
    name: Collaboration Supervisor image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build Collaboration Supervisor image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/collaboration_supervisor/Dockerfile
          tags: niov/collaboration-supervisor:${{ env.IMAGE_TAG }}
          push: false
          load: true
          cache-from: type=gha,scope=collaboration-supervisor
          cache-to: type=gha,scope=collaboration-supervisor,mode=max
      - name: Smoke (image exists)
        run: docker image inspect niov/collaboration-supervisor:${{ env.IMAGE_TAG }} > /dev/null
